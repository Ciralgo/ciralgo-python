name: SDK / Python

# Two jobs:
#   - `test`    runs on every PR + push that touches the repo.
#   - `publish` runs on tags of the form `sdk-py-v*` and publishes to PyPI
#     via OIDC Trusted Publishing. No long-lived API token in CI secrets.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'sdk-py-v*'

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install with dev extras
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        # Allow type checking to surface issues but not block the test
        # gate yet. The SDK is v1.1.0 and type hints are conservative.
        run: mypy src || echo "::warning::mypy reported issues; not blocking"

      - name: Run tests
        run: pytest -v

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-py-v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install --upgrade pip build hatchling

      - name: Verify tag version matches pyproject.toml
        # The release tag MUST match the pyproject version exactly. A
        # mismatch is almost always operator error. Fail loudly.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag version ($TAG_VERSION) does not match pyproject version ($PYPROJECT_VERSION)"
            exit 1
          fi

      - name: Build
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ciralgo-dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-py-v')
    environment:
      name: pypi
      url: https://pypi.org/project/ciralgo/
    # OIDC trusted publishing. No PYPI_API_TOKEN needed in secrets. The
    # PyPI side must be pre-configured to trust this workflow + repo +
    # environment. See docs/publish-runbook.md.
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: ciralgo-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
